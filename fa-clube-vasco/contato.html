<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contato - Fã Clube do Vasco</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">
          Fã Clube do Vasco
        </a>
        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Início</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="sobre.html">Sobre</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="contato.html">Contato</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main>
      <section class="container mt-5">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <h1 class="text-center mb-2">Contato</h1>
            <p class="text-center text-muted mb-4">
              Mande-nos uma mensagem. Pode ser uma opinião, algum feedback,
              adoraríamos ouvi-la.
            </p>
            <form class="card shadow p-4">
              <div class="mb-3">
                <label class="form-label">Nome</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Digite seu nome"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  placeholder="Digite seu email"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Telefone</label>
                <input
                  type="tel"
                  class="form-control"
                  placeholder="(00) 00000-0000"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Mensagem</label>
                <textarea
                  class="form-control"
                  rows="3"
                  placeholder="Escreva sua mensagem"
                ></textarea>
              </div>
              <button class="btn btn-danger w-100">Enviar mensagem</button>
            </form>
          </div>
        </div>
      </section>
    </main>
    <footer>Fã Clube do Vasco</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
